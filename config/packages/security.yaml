security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_connexion
                check_path: app_connexion
                username_parameter: username
                password_parameter: password
                default_target_path: app_compte_dashboard
                enable_csrf: true

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800   # 7 jours
                path: /
                remember_me_parameter: remember_me

            logout:
                path: app_deconnexion
                target: app_home

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/compte, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
